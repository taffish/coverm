[package]
name = "coverm"
kind = "tool"
version = "0.7.0"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[meta]
domain = "bio"
categories = ["metagenomics", "coverage", "abundance", "alignment", "bam", "genome-binning"]
keywords = ["CoverM", "coverage", "relative-abundance", "metagenomics", "MAG", "contig", "genome", "BAM", "minimap2", "samtools", "skani", "fastANI"]
description = "DNA read coverage and relative-abundance calculation for contigs, genomes, and metagenomic assemblies."

[repository]
url = "https://github.com/taffish/coverm"

[command]
name = "taf-coverm"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/coverm:0.7.0-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[upstream]
name = "CoverM"
type = "github"
repo = "wwood/CoverM"
homepage = "https://github.com/wwood/CoverM"
manual = "https://wwood.github.io/CoverM/"
release_url = "https://github.com/wwood/CoverM/releases/tag/v0.7.0"
downloads = "bioconda::coverm=0.7.0; https://github.com/wwood/CoverM/archive/refs/tags/v0.7.0.tar.gz"
version = "0.7.0"
license = "GPL-3.0-or-later"
citation = "Aroney et al. 2025, CoverM: Read alignment statistics for metagenomics, Bioinformatics 41:4"
doi = "10.1093/bioinformatics/btaf147"
watch = "tags"
strip_prefix = "v"

[smoke]
backend = "docker"
timeout = 180
exist = ["coverm", "samtools", "minimap2", "bwa", "bwa-mem2", "strobealign", "fastANI", "skani", "starcode", "man", "tee", "sh", "grep", "find"]
test = ["coverm --version 2>&1 | grep -Fx 'coverm 0.7.0' >/dev/null", "coverm --help 2>&1 | grep -F 'Calculate coverage' >/dev/null && coverm genome --help 2>&1 | grep -F 'coverm genome' >/dev/null && coverm contig --help 2>&1 | grep -F 'coverm contig' >/dev/null && coverm make --help 2>&1 | grep -F 'coverm make' >/dev/null && coverm filter --help 2>&1 | grep -F 'coverm filter' >/dev/null && coverm cluster --help 2>&1 | grep -iF 'cluster' >/dev/null", "samtools --version 2>&1 | grep -F 'samtools' >/dev/null && minimap2 --version >/dev/null && { bwa 2>&1 || true; } | grep -iF 'bwa' >/dev/null && command -v bwa-mem2 >/dev/null && command -v strobealign >/dev/null && command -v fastANI >/dev/null && { skani --version 2>&1 || true; } | grep -iF 'skani' >/dev/null", "/opt/coverm/share/testdata/coverm-smoke-bam.sh", "/opt/coverm/share/testdata/coverm-smoke-map.sh"]
